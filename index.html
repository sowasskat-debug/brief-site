<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=Space+Mono:wght@400;700&family=Inter:wght@400;500;600&display=swap');

* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

:root {
  --bg:     #ffffff;
  --gray1:  #f7f7f7;
  --gray2:  #f0f0f0;
  --rule:   #e2e2e2;
  --muted:  #999999;
  --text:   #0a0a0a;
  --sub:    #2a2a2a;
  --red:    #cc0000;
  --amber:  #b45309;
  --blue:   #1d4ed8;
  --violet: #6d28d9;
  --top-h:  58px;
  --tab-h:  44px;
}
[data-theme="dark"] {
  --bg:    #0f0f0f;
  --gray1: #191919;
  --gray2: #222222;
  --rule:  #2e2e2e;
  --muted: #606060;
  --text:  #efefef;
  --sub:   #c0c0c0;
  --red:   #e03030;
  --amber: #d97706;
  --blue:  #3b82f6;
  --violet:#8b5cf6;
}

html, body {
  height: 100%;
  font-family: 'Space Mono', monospace;
  background: var(--bg);
  color: var(--text);
  overscroll-behavior: none;
}

/* ══ TOPBAR ══ */
.topbar {
  position: fixed; top: 0; left: 0; right: 0; z-index: 60;
  background: var(--bg);
  border-bottom: 3px solid var(--text);
  height: var(--top-h);
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 16px;
}

.logo {
  font-family: 'DM Serif Display', serif;
  font-size: 22px; font-weight: 400; font-style: italic;
  color: var(--text); letter-spacing: 0.5px; line-height: 1;
}
.logo-dot { color: var(--red); font-style: normal; }

.topbar-date {
  font-size: 7.5px; font-weight: 700;
  text-transform: uppercase; letter-spacing: 1.5px;
  color: var(--muted); margin-top: 2px;
}

.topbar-right { display: flex; align-items: center; gap: 10px; }

.live-pill {
  display: flex; align-items: center; gap: 5px;
  border: 1px solid var(--red); padding: 3px 8px; border-radius: 2px;
}
.live-dot {
  width: 5px; height: 5px; border-radius: 50%; background: var(--red);
  animation: blink 1.4s ease-in-out infinite;
}
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.2} }
.live-text { font-size: 8px; font-weight: 700; letter-spacing: 2px; color: var(--red); }

.refresh-btn {
  width: 28px; height: 28px; border: 1px solid var(--rule);
  border-radius: 2px; background: transparent; color: var(--muted);
  font-size: 15px; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
}
.refresh-btn:active { color: var(--text); border-color: var(--text); }
.refresh-btn.spinning { animation: spin 1s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }

/* ══ DOSE TABS ══ */
.dose-tabs {
  position: fixed; top: var(--top-h); left: 0; right: 0; z-index: 59;
  background: var(--bg);
  height: var(--tab-h);
  display: flex;
  border-bottom: 1px solid var(--rule);
  transform: translateY(0);
  transition: transform 0.25s cubic-bezier(0.4,0,0.2,1);
}
.dose-tabs.hidden { transform: translateY(calc(-1 * var(--tab-h))); }

.dose-tab {
  flex: 1; border: none; border-right: 1px solid var(--rule);
  background: var(--bg); cursor: pointer;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center; gap: 3px;
  position: relative; transition: background 0.15s;
}
.dose-tab:last-child { border-right: none; }
.dose-tab:active { background: var(--gray1); }

.tab-emoji { font-size: 13px; line-height: 1; }
.tab-label {
  font-family: 'Space Mono', monospace;
  font-size: 7.5px; font-weight: 700;
  letter-spacing: 1.5px; text-transform: uppercase;
  color: var(--muted); transition: color 0.15s;
}

.dose-tab.active { background: var(--bg); }
.dose-tab.active .tab-label { color: var(--text); }
.dose-tab.active::after {
  content: ''; position: absolute;
  bottom: 0; left: 0; right: 0; height: 3px;
}
.dose-tab.active.morning::after  { background: var(--amber); }
.dose-tab.active.afternoon::after { background: var(--blue); }
.dose-tab.active.evening::after  { background: var(--violet); }

/* ══ SCROLL AREA ══ */
.scroll-area {
  margin-top: calc(var(--top-h) + var(--tab-h));
  height: calc(100vh - var(--top-h) - var(--tab-h));
  overflow-y: auto;
  transition: margin-top 0.25s cubic-bezier(0.4,0,0.2,1),
              height     0.25s cubic-bezier(0.4,0,0.2,1);
}
.scroll-area.tabs-hidden {
  margin-top: var(--top-h);
  height: calc(100vh - var(--top-h));
}

/* ══ EDITION BAR ══ */
.edition-bar {
  display: flex; align-items: center; justify-content: space-between;
  padding: 9px 16px; background: var(--gray1);
  border-bottom: 1px solid var(--rule);
}
.edition-name {
  font-size: 7.5px; font-weight: 700;
  letter-spacing: 2px; text-transform: uppercase; color: var(--muted);
}
.edition-time { font-size: 7.5px; color: var(--muted); letter-spacing: 1px; }

/* ══ HERO CARD ══ */
.hero-card {
  padding: 20px 16px 16px; background: var(--bg);
  border-bottom: 2px solid var(--text);
  cursor: pointer; -webkit-user-select: none; user-select: none;
}
.hero-card:active { background: var(--gray1); }

.hero-kicker {
  display: flex; align-items: center; gap: 8px; margin-bottom: 10px;
}
.hero-flag { font-size: 15px; line-height: 1; }
.hero-kicker-label {
  font-size: 7.5px; font-weight: 700;
  letter-spacing: 2px; text-transform: uppercase;
}
.kicker-morning   { color: var(--amber); }
.kicker-afternoon { color: var(--blue); }
.kicker-evening   { color: var(--violet); }

.hero-title {
  font-family: 'DM Serif Display', serif;
  font-size: 23px; font-weight: 400; line-height: 1.22;
  letter-spacing: -0.2px; color: var(--text); margin-bottom: 14px;
}

.item-time {
  font-size: 8px; color: var(--muted); letter-spacing: 0.3px;
  margin-top: 3px;
}
.hero-card > .item-time { margin-bottom: 10px; margin-top: -6px; }

.hero-footer {
  display: flex; align-items: center; justify-content: space-between;
}
.hero-source {
  font-size: 7.5px; font-weight: 700;
  letter-spacing: 1.5px; text-transform: uppercase; color: var(--muted);
}
.hero-arrow {
  font-size: 14px; color: var(--muted);
  transition: transform 0.2s, color 0.2s;
}
.hero-card.open .hero-arrow { transform: rotate(90deg); color: var(--text); }

/* ══ DIVIDER ══ */
.section-rule {
  display: flex; align-items: center; gap: 10px;
  padding: 9px 16px; background: var(--gray1);
  border-bottom: 1px solid var(--rule);
}
.section-rule-line { flex: 1; height: 1px; background: var(--rule); }
.section-rule-label {
  font-size: 7px; font-weight: 700;
  letter-spacing: 2px; text-transform: uppercase; color: var(--muted);
}

/* ══ NEWS ITEM ══ */
.news-item {
  display: flex; align-items: flex-start; gap: 12px;
  padding: 14px 16px; background: var(--bg);
  border-bottom: 1px solid var(--rule);
  cursor: pointer; -webkit-user-select: none; user-select: none;
}
.news-item:active { background: var(--gray1); }

.news-num {
  font-size: 9px; font-weight: 700; color: var(--red);
  flex-shrink: 0; margin-top: 2px; min-width: 18px; letter-spacing: 0.5px;
}
.news-body { flex: 1; min-width: 0; display: flex; flex-direction: column; gap: 4px; }
.news-flag { font-size: 13px; line-height: 1; }
.news-title {
  font-family: 'DM Serif Display', serif;
  font-size: 15.5px; font-weight: 400; line-height: 1.3; color: var(--text);
}
.news-arrow {
  font-size: 13px; color: var(--muted); flex-shrink: 0;
  margin-top: 2px; transition: transform 0.2s, color 0.2s;
}
.news-item.open .news-arrow { transform: rotate(90deg); color: var(--text); }

/* ══ SUB-ITEMS CONTAINER ══ */
.sub-items-container {
  display: none;
  background: var(--gray1);
  border-bottom: 1px solid var(--rule);
  padding-left: 16px;
}
.hero-card.open + .sub-items-container,
.news-item.open + .sub-items-container {
  display: block;
}

.sub-item {
  display: flex; align-items: flex-start; gap: 12px;
  padding: 14px 16px 14px 0;
  border-bottom: 1px solid var(--rule);
  cursor: pointer; -webkit-user-select: none; user-select: none;
}
.sub-item:last-child { border-bottom: none; }
.sub-item:active { opacity: 0.7; }
.sub-item-flag { font-size: 13px; line-height: 1.2; flex-shrink: 0; }
.sub-item-text {
  flex: 1;
  font-family: 'Space Mono', monospace;
  font-size: 11px; color: var(--sub); line-height: 1.45;
}
.sub-item-arrow {
  font-size: 12px; color: var(--muted); flex-shrink: 0;
  margin-top: 1px; transition: transform 0.2s, color 0.2s;
}
.sub-item.open .sub-item-arrow { transform: rotate(90deg); color: var(--text); }

/* ══ EXPAND PANEL ══ */
.card-expand {
  display: none;
  background: var(--gray1);
  border-bottom: 1px solid var(--rule);
  border-left: 3px solid var(--red);
  padding: 18px 18px 20px 15px;
}
/* Bezpośrednie rozwinięcie dla samodzielnych postów */
.hero-card.open + .card-expand,
.news-item.open + .card-expand { 
  display: block; 
}
/* Rozwinięcie wewnątrz grupy */
.sub-item.open + .card-expand { 
  display: block; 
  margin-left: -16px; /* Niweluje padding rodzica */
}

.expand-article {
  font-family: 'DM Serif Display', serif;
  font-size: 15px; line-height: 1.78; color: var(--sub);
}

.expand-divider { height: 1px; background: var(--rule); margin: 14px 0; }

/* Wpływ na rynek — wyróżniona linijka z kolorowymi strzałkami */
.impact-box {
  margin-top: 12px; padding: 10px 12px;
  border-left: 3px solid var(--amber);
  background: rgba(0,0,0,.03); border-radius: 0 6px 6px 0;
}
[data-theme="dark"] .impact-box { background: rgba(255,255,255,.04); }
.impact-label {
  display: block; font-family: 'Space Mono', monospace;
  font-size: 9px; letter-spacing: .12em; text-transform: uppercase;
  color: var(--muted); margin-bottom: 4px;
}
.impact-text { font-size: 13.5px; line-height: 1.5; color: var(--text); font-weight: 500; }
.imp-up { color: #16a34a; font-weight: 700; }
.imp-down { color: #dc2626; font-weight: 700; }
[data-theme="dark"] .imp-up { color: #22c55e; }
[data-theme="dark"] .imp-down { color: #ef4444; }

.expand-source-row {
  display: flex; align-items: center; justify-content: space-between;
}
.expand-source-left { display: flex; align-items: center; gap: 6px; }
.expand-source-tag {
  font-size: 7px; font-weight: 700;
  letter-spacing: 1.5px; text-transform: uppercase; color: var(--muted);
}
.expand-sep { color: var(--rule); }
.expand-source-name {
  font-size: 7.5px; font-weight: 700;
  letter-spacing: 1.5px; text-transform: uppercase; color: var(--text);
}
.expand-read-btn {
  font-size: 7.5px; font-weight: 700;
  letter-spacing: 1.5px; text-transform: uppercase;
  color: var(--red); text-decoration: none;
  border: 1px solid var(--red); padding: 5px 10px; border-radius: 1px;
}
.expand-read-btn:active { background: var(--red); color: #fff; }

.expand-actions { display: flex; align-items: center; gap: 8px; }
.expand-share-row { margin-top: 12px; display: flex; justify-content: flex-end; }
.expand-share-btn {
  background: none; cursor: pointer;
  font-family: 'Space Mono', monospace;
  font-size: 7.5px; font-weight: 700;
  letter-spacing: 1.5px; text-transform: uppercase;
  color: var(--sub); padding: 5px 10px;
  border: 1px solid var(--rule); border-radius: 1px;
  display: flex; align-items: center; gap: 4px;
}
.expand-share-btn:active { background: var(--rule); }
.expand-share-icon { font-size: 10px; }

/* ══ DESKTOP LAYOUT (≥1024px) ══════════════════════════════════════════════ */
@media (max-width: 1023px) { .dt-app { display: none !important; } }
@media (min-width: 1024px) {
  body { overflow: hidden; background: #f5f3ef; }
  [data-theme="dark"] body { background: #0f0f0f; }
  .topbar, .dose-tabs, .scroll-area, .install-banner { display: none !important; }
  .dt-app { display: flex !important; }
}
.dt-app {
  display: none;
  flex-direction: column;
  height: 100vh;
  max-width: 1600px;
  margin: 0 auto;
  font-family: 'Inter', sans-serif;
  background: #f5f3ef;
  color: var(--text);
  border-left: 1px solid #dbd8d2;
  border-right: 1px solid #dbd8d2;
}
[data-theme="dark"] .dt-app { background: #0f0f0f; border-color: #2a2a2a; }

/* header */
.dt-header {
  height: 56px; flex-shrink: 0;
  background: #f5f3ef; border-bottom: 1px solid #dbd8d2;
  display: flex; align-items: center; padding: 0 28px; gap: 18px;
}
[data-theme="dark"] .dt-header { background: #0f0f0f; border-bottom-color: #2a2a2a; }
.dt-logo { font-family: 'DM Serif Display', serif; font-style: italic; font-size: 28px; color: var(--text); letter-spacing: -0.5px; line-height: 1; flex-shrink: 0; }
.dt-logo-dot { color: var(--red); font-style: normal; }
.dt-header-sep { width: 1px; height: 22px; background: #dbd8d2; flex-shrink: 0; }
[data-theme="dark"] .dt-header-sep { background: #2a2a2a; }
.dt-header-date { font-family: 'Space Mono', monospace; font-size: 10px; color: var(--muted); letter-spacing: 1px; flex-shrink: 0; }
.dt-tabs { display: flex; gap: 3px; background: #e8e5df; padding: 3px; border-radius: 6px; margin-left: 8px; flex-shrink: 0; }
[data-theme="dark"] .dt-tabs { background: #1e1e1e; }
.dt-tab { font-family: 'Space Mono', monospace; font-size: 9px; letter-spacing: 1.5px; text-transform: uppercase; padding: 5px 14px; border-radius: 4px; cursor: pointer; color: var(--muted); border: none; background: transparent; white-space: nowrap; }
.dt-tab:hover { color: var(--text); }
.dt-tab.active { background: var(--bg); color: var(--text); }
.dt-tab.active.morning  { background: var(--amber); color: #fff; }
.dt-tab.active.afternoon { background: var(--text); color: var(--bg); }
.dt-tab.active.evening  { background: var(--violet); color: #fff; }
.dt-header-right { margin-left: auto; display: flex; align-items: center; gap: 10px; }
.dt-live { display: flex; align-items: center; gap: 5px; font-family: 'Space Mono', monospace; font-size: 9px; letter-spacing: 1.5px; color: var(--red); flex-shrink: 0; }
.dt-live-dot { width: 5px; height: 5px; border-radius: 50%; background: var(--red); animation: blink 1.4s ease-in-out infinite; }

/* 3-column body */
.dt-body { display: grid; grid-template-columns: 210px 1fr 380px; flex: 1; overflow: hidden; }

/* left index */
.dt-index { border-right: 1px solid #dbd8d2; overflow-y: auto; }
[data-theme="dark"] .dt-index { border-right-color: #2a2a2a; }
.dt-index-section { padding: 18px 0 4px; border-bottom: 1px solid #eae7e1; }
[data-theme="dark"] .dt-index-section { border-bottom-color: #222; }
.dt-index-section:last-child { border-bottom: none; }
.dt-index-title { font-family: 'Space Mono', monospace; font-size: 8px; letter-spacing: 2px; text-transform: uppercase; color: var(--muted); padding: 0 18px 8px; }
.dt-index-item { padding: 7px 18px; display: flex; align-items: center; gap: 10px; cursor: pointer; border-left: 2px solid transparent; user-select: none; -webkit-user-select: none; }
.dt-index-item:hover { background: rgba(0,0,0,.03); }
[data-theme="dark"] .dt-index-item:hover { background: rgba(255,255,255,.04); }
.dt-index-item.active { border-left-color: var(--red); background: rgba(204,0,0,.05); }
.dt-index-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
.dt-index-label { font-size: 12px; color: var(--text); font-weight: 500; flex: 1; }
.dt-index-n { font-family: 'Space Mono', monospace; font-size: 9px; color: var(--muted); }
.dt-index-item.dim .dt-index-label { color: var(--muted); font-weight: 400; }

/* center feed */
.dt-feed { display: flex; flex-direction: column; border-right: 1px solid #dbd8d2; overflow: hidden; }
[data-theme="dark"] .dt-feed { border-right-color: #2a2a2a; }
.dt-feed-header { padding: 12px 22px; border-bottom: 1px solid #e2dfd9; display: flex; align-items: center; justify-content: space-between; flex-shrink: 0; background: #f5f3ef; }
[data-theme="dark"] .dt-feed-header { background: #0f0f0f; border-bottom-color: #222; }
.dt-feed-title { font-family: 'Space Mono', monospace; font-size: 9px; letter-spacing: 2px; color: var(--muted); text-transform: uppercase; }
.dt-feed-count { font-family: 'Space Mono', monospace; font-size: 9px; color: var(--muted); }
.dt-feed-list { overflow-y: auto; flex: 1; background: #f5f3ef; }
[data-theme="dark"] .dt-feed-list { background: #0f0f0f; }

/* feed items */
.dt-item { padding: 12px 22px; border-bottom: 1px solid #eae7e1; cursor: pointer; display: grid; grid-template-columns: 28px 20px 1fr; gap: 10px; align-items: flex-start; }
[data-theme="dark"] .dt-item { border-bottom-color: #1e1e1e; }
.dt-item:hover { background: rgba(0,0,0,.025); }
[data-theme="dark"] .dt-item:hover { background: rgba(255,255,255,.04); }
.dt-item.selected { background: rgba(204,0,0,.05); border-left: 2px solid var(--red); padding-left: 20px; }
.dt-item.top-item { border-left: 2px solid var(--red); padding-left: 20px; }
.dt-item.group-header { background: #efecea; }
[data-theme="dark"] .dt-item.group-header { background: #141414; }
.dt-item.group-header:hover { background: #e8e5e0; }
.dt-item-num { font-family: 'Space Mono', monospace; font-size: 9px; color: var(--muted); padding-top: 2px; text-align: right; }
.dt-item-flag { font-size: 14px; padding-top: 1px; }
.dt-item-body { min-width: 0; }
.dt-item-badges { display: flex; gap: 5px; margin-bottom: 3px; }
.dt-badge { font-family: 'Space Mono', monospace; font-size: 8px; letter-spacing: 0.5px; padding: 1px 5px; border-radius: 2px; }
.dt-badge-brk { background: var(--red); color: #fff; }
.dt-item-headline { font-size: 13px; font-weight: 500; color: var(--text); line-height: 1.4; margin-bottom: 3px; }
.dt-item-meta { font-family: 'Space Mono', monospace; font-size: 9px; color: var(--muted); display: flex; gap: 8px; }

/* group sub-items */
.dt-group-subs { padding-left: 18px; border-bottom: 1px solid #eae7e1; }
[data-theme="dark"] .dt-group-subs { border-bottom-color: #1e1e1e; }
.dt-sub-item { padding: 9px 22px 9px 0; border-bottom: 1px solid #f0ede8; display: flex; gap: 10px; align-items: flex-start; cursor: pointer; }
[data-theme="dark"] .dt-sub-item { border-bottom-color: #1c1c1c; }
.dt-sub-item:last-child { border-bottom: none; }
.dt-sub-item:hover { background: rgba(0,0,0,.02); }
.dt-sub-item.selected { border-left: 2px solid var(--red); padding-left: 6px; }
.dt-sub-flag { font-size: 13px; flex-shrink: 0; }
.dt-sub-text { font-size: 12px; color: var(--sub); line-height: 1.4; }

/* right detail panel */
.dt-detail { background: var(--bg); display: flex; flex-direction: column; overflow-y: auto; }
.dt-detail-empty { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 10px; color: var(--muted); }
.dt-detail-empty-icon { font-size: 28px; opacity: .25; }
.dt-detail-empty-text { font-family: 'Space Mono', monospace; font-size: 9px; letter-spacing: 1.5px; text-transform: uppercase; }
.dt-detail-content { padding: 26px 26px 20px; }
.dt-detail-flag { font-size: 26px; margin-bottom: 10px; }

.dt-related-item:last-child { border-bottom: none; }

@keyframes deepLinkFlash {
  0%,100% { background: transparent; }
  30% { background: rgba(204,0,0,0.08); }
}
.deep-link-highlight { animation: deepLinkFlash 1.8s ease; }

/* ══ SKELETON ══ */
.skel {
  border-radius: 1px;
  background: linear-gradient(90deg, var(--gray2) 25%, var(--gray1) 50%, var(--gray2) 75%);
  background-size: 300% 100%; animation: shimmer 1.4s infinite;
}
@keyframes shimmer { to { background-position: -300% 0; } }

/* ══ TOAST ══ */
.toast {
  position: fixed; bottom: 28px; left: 50%;
  transform: translateX(-50%) translateY(80px);
  background: var(--text); color: #fff;
  font-size: 8px; font-weight: 700; letter-spacing: 2px; text-transform: uppercase;
  padding: 9px 18px; border-radius: 1px;
  border-left: 3px solid var(--red);
  transition: transform 0.25s; white-space: nowrap; z-index: 300;
}
.toast.show { transform: translateX(-50%) translateY(0); }

.bell-btn { background: none; border: none; cursor: pointer; font-size: 16px; padding: 4px 6px; }
.bell-btn.active { filter: grayscale(0); }
.bell-btn.inactive { filter: grayscale(1); opacity: 0.4; }

.theme-btn {
  background: none; border: none; cursor: pointer;
  font-size: 15px; padding: 4px 6px; line-height: 1;
}

/* ══ PULL-TO-REFRESH ══ */
#ptr {
  display: flex; align-items: center; justify-content: center;
  height: 0; overflow: hidden;
  transition: height 0.2s;
  color: var(--muted); font-size: 8px; font-weight: 700;
  letter-spacing: 2px; text-transform: uppercase;
}
#ptr.pulling { height: 48px; }
#ptr.refreshing { height: 48px; }
.ptr-spinner {
  width: 18px; height: 18px; border: 2px solid var(--rule);
  border-top-color: var(--red); border-radius: 50%;
  animation: spin 0.7s linear infinite;
}

/* ══ INSTALL BANNER ══ */
.install-banner {
  position: fixed; bottom: 0; left: 0; right: 0; z-index: 200;
  background: var(--bg); border-top: 2px solid var(--text);
  padding: 14px 16px;
  display: flex; align-items: center; justify-content: space-between;
  gap: 12px;
  transform: translateY(100%);
  transition: transform 0.3s cubic-bezier(0.4,0,0.2,1);
}
.install-banner.show { transform: translateY(0); }
.install-text {
  font-size: 10px; font-weight: 700;
  letter-spacing: 1px; color: var(--text);

}
.install-actions { display: flex; gap: 8px; }
.install-btn-add {

.install-btn-dismiss {

  background: none; color: var(--muted);

}

let currentDose = getCurrentDose();
let cache = {};
let lastScrollY = 0, tabsHidden = false;
let suppressScrollHide = false;

const scrollArea = document.getElementById('scrollArea');
scrollArea.addEventListener('scroll', function() {
  const sy = this.scrollTop;
  const delta = sy - lastScrollY;

  // Ignoruj skoki spowodowane zmianą layoutu (np. otwarcie/zamknięcie klastra),
  // a nie realnym przewijaniem palcem — duży, nagły skok w jedną ramkę.
  if (suppressScrollHide || Math.abs(delta) > 150) {
    lastScrollY = sy;
    return;
  }

  const tabs = document.getElementById('doseTabs');
  if (delta > 0 && sy > 40 && !tabsHidden) {
    tabs.classList.add('hidden'); this.classList.add('tabs-hidden'); tabsHidden = true;
  } else if (delta < -8 && tabsHidden) {
    tabs.classList.remove('hidden'); this.classList.remove('tabs-hidden'); tabsHidden = false;
  }
  lastScrollY = sy;
}, { passive: true });

function getCurrentDose() {
  const h = new Date().getHours();
  return h < 11 ? 'morning' : h < 17 ? 'afternoon' : 'evening';
}
function uid() { return Math.random().toString(36).slice(2,9); }
function esc(s='') { return s.replace(/\\/g,'\\\\').replace(/'/g,"\\'").replace(/"/g,'\\"').replace(/\n/g,' '); }
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2200);
}

// ══ briefs.json — generowany przez bota na Telegramie ═
// Świeżość per-dawka jest już zarządzana po stronie bota (Europe/Warsaw),
// front-end ufa serwerowi i nie porównuje dat między różnymi zegarami/strefami.
async function fetchFromBriefsJson(dose) {
  try {
    const r = await fetch('./briefs.json', { cache: 'no-store' });
    if (!r.ok) return null;
    const d = await r.json();
    const doseData = d?.[dose];
    if (!doseData || !doseData.items?.length) return null;
    return doseData.items;
  } catch(e) { return null; }
}

async function fetchFromSupabase(dose) {
  if (SUPABASE_URL === 'TWOJ_SUPABASE_URL') return null;
  const today = new Date().toISOString().split('T')[0];
  const res = await fetch(`${SUPABASE_URL}/rest/v1/briefs?dose=eq.${dose}&date=eq.${today}&order=created_at.desc&limit=1`, {
    headers: { 'apikey': SUPABASE_ANON, 'Authorization': `Bearer ${SUPABASE_ANON}` }
  });
  const d = await res.json();
  return d?.length > 0 ? d[0].items : null;
}

async function loadDose(dose, force=false) {
  if (cache[dose] && !force) { renderDose(dose, cache[dose]); return; }
  renderSkeleton();
  try {
    let items = await fetchFromBriefsJson(dose);

    if (!items) items = await fetchFromSupabase(dose);

    if (!items) items = SAMPLE[dose];

    cache[dose] = items.map(i => ({ ...i, id: uid(), subItems: (i.subItems || []).map(sub => ({ ...sub, id: uid() })) }));
    renderDose(dose, cache[dose]);
  } catch(e) {
    cache[dose] = SAMPLE[dose].map(i => ({ ...i, id: uid(), subItems: (i.subItems || []).map(sub => ({ ...sub, id: uid() })) }));
    renderDose(dose, cache[dose]);
  }
}

function formatAddedAt(item) {
  if (!item.added_at) return '';
  const [datePart, timePart] = item.added_at.split(' ');
  if (!datePart || !timePart) return '';
  const [, m, d] = datePart.split('-');
  return `${d}.${m} · ${timePart}`;
}

function itemSlug(text) {
  let h = 5381;
  for (let i = 0; i < Math.min(text.length, 80); i++) {
    h = ((h << 5) + h) ^ text.charCodeAt(i);
    h = h >>> 0;
  }
  return h.toString(36);
}

async function shareItem(url, title) {
  if (navigator.share) {
    try {
      await navigator.share({ title: 'BrifUp', text: title, url });
      return;
    } catch(e) {
      if (e.name === 'AbortError') return;
    }
  }
  try {
    await navigator.clipboard.writeText(url);
    showToast('Link skopiowany');
  } catch(e) {
    showToast('Nie można skopiować linku');
  }
}

function escAttr(s) {
  return s.replace(/&/g,'&amp;').replace(/"/g,'&quot;');
}

// Linia "Wpływ na rynek": koloruje strzałki ↑ (zielony) / ↓ (czerwony)
function impactHtml(item) {
  if (!item.impact) return '';
  const colored = item.impact
    .replace(/↑/g, '<span class="imp-up">↑</span>')
    .replace(/↓/g, '<span class="imp-down">↓</span>');
  return `<div class="impact-box">
    <span class="impact-label">Wpływ na rynek</span>
    <span class="impact-text">${colored}</span>
  </div>`;
}

function expandBlock(item) {
  const slug = itemSlug(item.text);
  const shareUrl = `https://brifup.com/#${currentDose}/${slug}`;
  const shareBtn = `<button class="expand-share-btn"
    onclick="event.stopPropagation();shareItem('${escAttr(shareUrl)}','${escAttr(item.text)}')"
    ><span class="expand-share-icon">↑</span>Udostępnij</button>`;

  if (item.article) {
    const readBtn = item.source_url && item.source_url !== '#'
      ? `<a class="expand-read-btn" href="${item.source_url}" target="_blank">Czytaj →</a>`
      : item.rssLink
      ? `<a class="expand-read-btn" href="${item.rssLink}" target="_blank">Czytaj →</a>`
      : '';
    return `
      <div class="expand-article">${item.article}</div>
      ${impactHtml(item)}
      <div class="expand-divider"></div>
      <div class="expand-source-row">
        <div class="expand-source-left">
          <span class="expand-source-tag">Źródło</span>
          <span class="expand-sep">/</span>
          <span class="expand-source-name">${item.source_name||'—'}</span>
        </div>
        <div class="expand-actions">${shareBtn}${readBtn}</div>
      </div>`;
  }
  return `
    <div class="expand-loading">Brak rozszerzonego artykułu dla tego newsa.</div>
    <div class="expand-share-row">${shareBtn}</div>`;
}

function renderSubItems(subItems) {
  if (!subItems || subItems.length === 0) return '';
  return subItems.map(sub => `
    <div class="sub-item" id="item-${sub.id}" onclick="event.stopPropagation();toggleSubItem('${sub.id}')">
      <span class="sub-item-flag">${sub.flag||'📰'}</span>
      <div class="sub-item-text">${sub.text}${sub.added_at ? `<div class="item-time">${formatAddedAt(sub)}</div>` : ''}</div>
      <div class="sub-item-arrow">›</div>
    </div>
    <div class="card-expand" id="exp-${sub.id}">${expandBlock(sub)}</div>
  `).join('');
}

function renderDose(dose, items) {
  const cfg = DOSE_CFG[dose];
  if (!items || items.length === 0) return;
  const hero = items[0];
  const isHeroGroup = hero.subItems && hero.subItems.length > 0;

  const heroBlock = isHeroGroup ? `
    <div class="hero-card" id="group-${hero.id}" onclick="toggleGroup('${hero.id}')">
      <div class="hero-kicker">
        <span class="hero-flag">${hero.flag||'📰'}</span>
        <span class="hero-kicker-label ${cfg.kickerClass}">${cfg.kicker}</span>
      </div>
      <div class="hero-title">${hero.text}</div>
      <div class="hero-footer">
        <span class="hero-source">${hero.subItems.length} powiązane newsy</span>
        <span class="hero-arrow">›</span>
      </div>
    </div>
    <div class="sub-items-container" id="subc-${hero.id}">
      ${renderSubItems(hero.subItems)}
    </div>`
    : `
    <div class="hero-card" id="item-${hero.id}" onclick="toggleSubItem('${hero.id}')">
      <div class="hero-kicker">
        <span class="hero-flag">${hero.flag||'📰'}</span>
        <span class="hero-kicker-label ${cfg.kickerClass}">${cfg.kicker}</span>
      </div>
      <div class="hero-title">${hero.text}</div>
      ${hero.added_at ? `<div class="item-time">${formatAddedAt(hero)}</div>` : ''}
      <div class="hero-footer">
        <span class="hero-source">${hero.source_name || 'Czytaj pełny artykuł'}</span>
        <span class="hero-arrow">›</span>
      </div>
    </div>
    <div class="card-expand" id="exp-${hero.id}">${expandBlock(hero)}</div>`;

  const restBlocks = items.slice(1).map((item, i) => {
    const isGroup = item.subItems && item.subItems.length > 0;
    if (isGroup) {
      return `
        <div class="news-item" id="group-${item.id}" onclick="toggleGroup('${item.id}')">
          <div class="news-num">0${i+2}</div>
          <div class="news-body">
            <span class="news-flag">${item.flag||'📰'}</span>
            <div class="news-title">${item.text}</div>
          </div>
          <div class="news-arrow">›</div>
        </div>
        <div class="sub-items-container" id="subc-${item.id}">
          ${renderSubItems(item.subItems)}
        </div>`;
    } else {
      return `
        <div class="news-item" id="item-${item.id}" onclick="toggleSubItem('${item.id}')">
          <div class="news-num">0${i+2}</div>
          <div class="news-body">
            <span class="news-flag">${item.flag||'📰'}</span>
            <div class="news-title">${item.text}</div>
            ${item.added_at ? `<div class="item-time">${formatAddedAt(item)}</div>` : ''}
          </div>
          <div class="news-arrow">›</div>
        </div>
        <div class="card-expand" id="exp-${item.id}">${expandBlock(item)}</div>`;
    }
  }).join('');

  document.getElementById('content').innerHTML = `
    <div class="edition-bar">
      <div class="edition-name">${cfg.edition}</div>
      <div class="edition-time">${cfg.time} · ${new Date().toLocaleDateString('pl-PL',{day:'numeric',month:'short'})}</div>
    </div>
    ${heroBlock}
    <div class="section-rule">
      <div class="section-rule-line"></div>
      <div class="section-rule-label">Więcej tematów</div>
      <div class="section-rule-line"></div>
    </div>
    ${restBlocks}`;

  renderDesktop(dose, items);
  scrollArea.scrollTop = 0;
}

// ── Poziom 1: otwórz/zamknij GRUPĘ (klaster tematyczny) ──
function toggleGroup(groupId) {
  const groupEl = document.getElementById('group-'+groupId);
  const subcEl  = document.getElementById('subc-'+groupId);
  if (!groupEl || !subcEl) return;
  const isOpen = groupEl.classList.contains('open');

  // Layout zmieni wysokość strony — zignoruj wynikły z tego scroll event,
  // żeby taby Poranna/Południowa/Wieczorna nie chowały się przy zwykłym kliknięciu.
  suppressScrollHide = true;
  setTimeout(() => { suppressScrollHide = false; }, 400);

  // Zamknij WSZYSTKIE grupy i sub-itemy (i ich expandy) na poziomie głównym
  document.querySelectorAll('.hero-card.open, .news-item.open').forEach(c => c.classList.remove('open'));
  document.querySelectorAll('.sub-item.open').forEach(c => c.classList.remove('open'));

  if (!isOpen) {
    groupEl.classList.add('open');
    // Jeśli grupa ma tylko 1 podpunkt — otwórz go automatycznie
    const subItems = subcEl.querySelectorAll('.sub-item');
    if (subItems.length === 1) {
      const onlyId = subItems[0].id.replace('item-','');
      setTimeout(() => toggleSubItem(onlyId), 60);
    }
  }
}

// ── Poziom 2: otwórz/zamknij POJEDYNCZY news → pokazuje artykuł ──
function toggleSubItem(id) {
  const itemEl = document.getElementById('item-'+id);
  const exp    = document.getElementById('exp-'+id);
  if (!itemEl || !exp) return;
  const isOpen = itemEl.classList.contains('open');

  suppressScrollHide = true;
  setTimeout(() => { suppressScrollHide = false; }, 400);

  // Zamknij inne otwarte sub-itemy (ale NIE zamykaj nadrzędnej grupy)
  document.querySelectorAll('.sub-item.open').forEach(c => {
    if (c.id !== 'item-'+id) c.classList.remove('open');
  });

  if (!isOpen) {
    itemEl.classList.add('open');
  } else {
    itemEl.classList.remove('open');
  }
}

function switchDose(dose) {
  currentDose = dose;
  suppressScrollHide = true;
  setTimeout(() => { suppressScrollHide = false; }, 400);
  document.querySelectorAll('.dose-tab').forEach(t=>t.classList.remove('active'));
  document.getElementById('tab-'+dose).classList.add('active');
  document.querySelectorAll('.dt-tab').forEach(t=>t.classList.remove('active'));
  const dtTab = document.getElementById('dttab-'+dose);
  if (dtTab) dtTab.classList.add('active');
  // Taby zawsze widoczne po zmianie dawki
  document.getElementById('doseTabs').classList.remove('hidden');
  scrollArea.classList.remove('tabs-hidden');
  tabsHidden = false;
  lastScrollY = 0;
  loadDose(dose);
}

async function refresh() {
  const btn = document.getElementById('refreshBtn');
  btn.classList.add('spinning');
  delete cache[currentDose];
  await loadDose(currentDose, true);
  btn.classList.remove('spinning');
  showToast('Zaktualizowano');
}

document.getElementById('tab-'+currentDose).classList.add('active');

// ══ Deep link: brifup.com/#morning/slug ═══════════════
(function() {
  const hash = location.hash.slice(1);
  if (!hash) return;
  const sep = hash.indexOf('/');
  if (sep === -1) return;
  const dose = hash.slice(0, sep);
  const slug = hash.slice(sep + 1);
  if (!['morning','afternoon','evening'].includes(dose) || !slug) return;

  if (dose !== currentDose) switchDose(dose);

  function tryOpen(attempts) {
    const items = cache[dose];
    if (!items) {
      if (attempts < 25) setTimeout(() => tryOpen(attempts + 1), 200);
      return;
    }
    let found = null;
    outer: for (const it of items) {
      if (itemSlug(it.text) === slug) { found = it; break; }
      if (it.subItems) {
        for (const sub of it.subItems) {
          if (itemSlug(sub.text) === slug) { found = sub; break outer; }
        }
      }
    }
    if (!found) return;
    const el = document.getElementById('item-' + found.id);
    if (!el) return;
    if (!el.classList.contains('open')) toggleSubItem(found.id);
    setTimeout(() => {
      el.scrollIntoView({ behavior: 'smooth', block: 'center' });
      el.classList.add('deep-link-highlight');
      setTimeout(() => el.classList.remove('deep-link-highlight'), 2000);
    }, 120);
  }
  setTimeout(() => tryOpen(0), 150);
})();

// ══ Swipe między dawkami ══════════════════════════════
(function() {
  const DOSES = ['morning', 'afternoon', 'evening'];
  let touchStartX = 0, touchStartY = 0;
  const scrollArea = document.querySelector('.scroll-area');
  scrollArea.addEventListener('touchstart', e => {
    touchStartX = e.touches[0].clientX;
    touchStartY = e.touches[0].clientY;
  }, { passive: true });
  scrollArea.addEventListener('touchend', e => {
    const dx = e.changedTouches[0].clientX - touchStartX;
    const dy = e.changedTouches[0].clientY - touchStartY;
    if (Math.abs(dx) < 50 || Math.abs(dx) < Math.abs(dy) * 1.5) return;
    const idx = DOSES.indexOf(currentDose);
    if (dx < 0 && idx < DOSES.length - 1) switchDose(DOSES[idx + 1]);
    else if (dx > 0 && idx > 0) switchDose(DOSES[idx - 1]);
  }, { passive: true });
})();

// ══ Dark mode ═════════════════════════════════════════
(function() {
  // Domyślnie jasny (dzienny) motyw na pierwszej wizycie — nie dziedziczymy trybu ciemnego z ustawień systemu.
  const saved = localStorage.getItem('brifup_theme');
  const theme = saved || 'light';
  document.documentElement.setAttribute('data-theme', theme);
  const btn = document.getElementById('themeBtn');
  if (btn) btn.textContent = theme === 'dark' ? '☀️' : '🌙';
})();

function toggleTheme() {
  const current = document.documentElement.getAttribute('data-theme');
  const next = current === 'dark' ? 'light' : 'dark';
  document.documentElement.setAttribute('data-theme', next);
  localStorage.setItem('brifup_theme', next);
  document.getElementById('themeBtn').textContent = next === 'dark' ? '☀️' : '🌙';
}

// ══ Pull-to-refresh ════════════════════════════════════
(function() {
  const ptr = document.getElementById('ptr');
  const area = document.getElementById('scrollArea');
  let startY = 0, pulling = false, refreshing = false;

  area.addEventListener('touchstart', e => {
    if (area.scrollTop === 0) { startY = e.touches[0].clientY; pulling = true; }
  }, { passive: true });

  area.addEventListener('touchmove', e => {
    if (!pulling || refreshing) return;
    const dy = e.touches[0].clientY - startY;
    if (dy > 10) {
      ptr.classList.add('pulling');
      ptr.innerHTML = dy > 60 ? '<span class="ptr-arrow">↑ Puść by odświeżyć</span>' : '<span class="ptr-arrow">↓ Odśwież</span>';
    } else {
      ptr.classList.remove('pulling');
    }
  }, { passive: true });

  area.addEventListener('touchend', e => {
    if (!pulling) return;
    const dy = e.changedTouches[0].clientY - startY;
    pulling = false;
    if (dy > 60 && !refreshing) {
      refreshing = true;
      ptr.innerHTML = '<div class="ptr-spinner"></div>';
      ptr.classList.add('refreshing');
      refresh().then(() => {
        ptr.classList.remove('pulling', 'refreshing');
        ptr.innerHTML = '<span class="ptr-arrow">↓ Odśwież</span>';
        refreshing = false;
      });
    } else {
      ptr.classList.remove('pulling', 'refreshing');
    }
  }, { passive: true });
})();

// ══ PWA Install banner ════════════════════════════════
let deferredInstallPrompt = null;
const _visits = parseInt(localStorage.getItem('brifup_visits') || '0') + 1;
localStorage.setItem('brifup_visits', _visits);

window.addEventListener('beforeinstallprompt', e => {
  e.preventDefault();
  deferredInstallPrompt = e;
  if (_visits >= 2 && !localStorage.getItem('brifup_install_dismissed')) {
    setTimeout(() => document.getElementById('installBanner').classList.add('show'), 2000);
  }
});

async function installApp() {
  document.getElementById('installBanner').classList.remove('show');
  if (!deferredInstallPrompt) return;
  deferredInstallPrompt.prompt();
  await deferredInstallPrompt.userChoice;
  deferredInstallPrompt = null;
  localStorage.setItem('brifup_install_dismissed', '1');
}

function dismissInstall() {
  document.getElementById('installBanner').classList.remove('show');
  localStorage.setItem('brifup_install_dismissed', '1');
}

// ══ PWA — rejestracja Service Workera ════════════════
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('service-worker.js')
      .then(() => console.log('Service Worker zarejestrowany'))
      .catch((err) => console.warn('SW registration failed:', err));
  });
  // Auto-reload gdy nowy SW przejmie kontrolę (nowa wersja apki)
  let refreshing = false;
  navigator.serviceWorker.addEventListener('controllerchange', () => {
    if (!refreshing) { refreshing = true; window.location.reload(); }
  });
}

// ══ OneSignal — push notifications ════════════════════
const ONESIGNAL_APP_ID = '20698631-0f06-4308-a11e-4a0388c68853';

window.OneSignalDeferred = window.OneSignalDeferred || [];
OneSignalDeferred.push(async function(OneSignal) {
  if (ONESIGNAL_APP_ID === 'TWOJ_ONESIGNAL_APP_ID') return;
  await OneSignal.init({ appId: ONESIGNAL_APP_ID });
  updateBellBtn();
  OneSignal.User.PushSubscription.addEventListener('change', updateBellBtn);
});

function updateBellBtn() {
  const btn = document.getElementById('bellBtn');
  if (!btn || !window.OneSignal) return;
  const subscribed = OneSignal.User.PushSubscription.optedIn;
  btn.classList.toggle('active', !!subscribed);
  btn.classList.toggle('inactive', !subscribed);
}

async function togglePush() {
  if (ONESIGNAL_APP_ID === 'TWOJ_ONESIGNAL_APP_ID') {
    showToast('Powiadomienia jeszcze niedostępne');
    return;
  }
  if (!window.OneSignal) {
    showToast('Nie można załadować powiadomień — sprawdź AdBlock lub połączenie');
    return;
  }
  try {
    if (OneSignal.User.PushSubscription.optedIn) {
      await OneSignal.User.PushSubscription.optOut();
      showToast('Powiadomienia wyłączone');
    } else {
      await OneSignal.Notifications.requestPermission();
      if (Notification.permission === 'denied') {
        showToast('Powiadomienia zablokowane — odblokuj w ustawieniach Chrome');
        return;
      }
      await OneSignal.User.PushSubscription.optIn();
      showToast('Powiadomienia włączone');
    }
    updateBellBtn();
  } catch (e) {
    showToast('Błąd: ' + (e.message || 'spróbuj ponownie'));
  }
}

// ══ DESKTOP LOGIC ═════════════════════════════════════

let dtItemsMap = {};
let dtCurrentItemId = null;
let dtAllItems = [];
let dtActiveFilter = null;

function isDesktop() { return window.innerWidth >= 1024; }

function dtGetCategory(item) {
  const t = (item.text || '').toLowerCase();
  if (/fed|ebc|ecb|boj|nbp|monetarn|inflacj|obniżk|podwyżk|stopa|stóp|oprocentow|rrr/.test(t)) return 'Fed / Banki';
  if (/geopolit|sankcj|wojn|armia|iran|ukraina|rosja|chiny\b|izrael|palestyn|konflikt|atak|droni|rakiet/.test(t)) return 'Geopolityka';
  if (/\bai\b|sztuczn|chip|nvidia|intel|apple\b|google\b|microsoft|openai|technolog|startup|\bmeta\b|amazo/.test(t)) return 'Tech / AI';
  if (/ropa|gaz\b|złot|metal|surowc|opec|brent|barrel|węgiel|miedź/.test(t)) return 'Surowce';
  return 'Rynki';
}

const DT_CAT_COLORS = {
  'Fed / Banki':'#ef4444','Geopolityka':'#f97316','Tech / AI':'#06b6d4','Surowce':'#22c55e','Rynki':'#6366f1'
};

function dtRenderSidebar(items) {
  const counts = {};
  function countIt(it) { const c = dtGetCategory(it); counts[c] = (counts[c]||0)+1; }
  items.forEach(it => it.subItems?.length > 0 ? it.subItems.forEach(countIt) : countIt(it));
  const catsEl = document.getElementById('dtCategories');
  if (catsEl) {
    const order = ['Fed / Banki','Geopolityka','Tech / AI','Surowce','Rynki'];
    catsEl.innerHTML = '<div class="dt-index-title">Tematy</div>' +
      order.filter(c => counts[c]).map(c =>
        `<div class="dt-index-item" onclick="dtFilterCat(this)">
          <div class="dt-index-dot" style="background:${DT_CAT_COLORS[c]}"></div>
          <span class="dt-index-label">${c}</span>
          <span class="dt-index-n">${counts[c]}</span>
        </div>`
      ).join('');
  }
  const archEl = document.getElementById('dtArchive');
  if (archEl) {
    const today = new Date();
    let html = '<div class="dt-index-title">Archiwum</div>';
    for (let i = 1; i <= 3; i++) {
      const d = new Date(today); d.setDate(today.getDate() - i);
      const label = d.toLocaleDateString('pl-PL',{day:'numeric',month:'short'});
      html += `<div class="dt-index-item dim"><div class="dt-index-dot" style="background:#ccc"></div><span class="dt-index-label">${label}</span></div>`;
    }
    archEl.innerHTML = html;
  }
}

function dtFilterCat(el) {
  const cat = el.querySelector('.dt-index-label')?.textContent;
  if (!cat) return;
  const wasActive = dtActiveFilter === cat;
  document.querySelectorAll('#dtCategories .dt-index-item').forEach(e => e.classList.remove('active'));
  if (wasActive) {
    dtActiveFilter = null;
    dtRenderFeed(dtAllItems);
  } else {
    dtActiveFilter = cat;
    el.classList.add('active');
    const filtered = dtAllItems.filter(it =>
      it.subItems?.length > 0
        ? it.subItems.some(sub => dtGetCategory(sub) === cat)
        : dtGetCategory(it) === cat
    );
    dtRenderFeed(filtered);
  }
  const fcEl = document.getElementById('dtFeedCount');
  if (fcEl) {
    const src = dtActiveFilter ? document.getElementById('dtFeedList').querySelectorAll('.dt-item').length : dtAllItems.reduce((s,it) => s + (it.subItems?.length > 0 ? it.subItems.length : 1), 0);
    fcEl.textContent = `${src} wpisów`;
  }
  dtShowEmpty();
}

function dtRenderFeed(items) {
  let html = '';
  items.forEach((item, i) => {
    const num = String(i+1).padStart(3,'0');
    const isGroup = item.subItems?.length > 0;
    const isTop = !!item.top;
    if (isGroup) {
      const subsHtml = item.subItems.map(sub =>
        `<div class="dt-sub-item" id="dts-${sub.id}" onclick="event.stopPropagation();dtPickItem('${sub.id}')">
          <span class="dt-sub-flag">${sub.flag||'📰'}</span>
          <div class="dt-sub-text">${sub.text}</div>
        </div>`
      ).join('');
      html += `<div class="dt-item group-header${isTop?' top-item':''}" id="dti-${item.id}" onclick="dtToggleGroup('${item.id}')">
        <div class="dt-item-num">${num}</div>
        <div class="dt-item-flag">${item.flag||'📰'}</div>
        <div class="dt-item-body">
          ${isTop?'<div class="dt-item-badges"><span class="dt-badge dt-badge-brk">BREAKING</span></div>':''}
          <div class="dt-item-headline">${item.text}</div>
          <div class="dt-item-meta"><span>↓ ${item.subItems.length} powiązane</span></div>
        </div>
      </div>
      <div class="dt-group-subs" id="dtg-${item.id}" style="display:none">${subsHtml}</div>`;
    } else {
      const t = formatAddedAt(item);
      html += `<div class="dt-item${isTop?' top-item':''}" id="dti-${item.id}" onclick="dtPickItem('${item.id}')">
        <div class="dt-item-num">${num}</div>
        <div class="dt-item-flag">${item.flag||'📰'}</div>
        <div class="dt-item-body">
          ${isTop?'<div class="dt-item-badges"><span class="dt-badge dt-badge-brk">BREAKING</span></div>':''}
          <div class="dt-item-headline">${item.text}</div>
          ${(t||item.source_name)?`<div class="dt-item-meta">${t?`<span>${t}</span>`:''} ${item.source_name?`<span>${item.source_name}</span>`:''}</div>`:''}
        </div>
      </div>`;
    }
  });
  const feedList = document.getElementById('dtFeedList');
  if (feedList) feedList.innerHTML = html;
}

function renderDesktop(dose, items) {
  if (!isDesktop()) return;
  dtItemsMap = {};
  dtAllItems = items;
  dtActiveFilter = null;
  items.forEach(it => {
    dtItemsMap[it.id] = it;
    (it.subItems||[]).forEach(sub => { dtItemsMap[sub.id] = sub; });
  });

  const doseNames = {morning:'Poranne',afternoon:'Popołudniowe',evening:'Wieczorne'};
  const dateStr = new Date().toLocaleDateString('pl-PL',{day:'numeric',month:'short',year:'numeric'}).toUpperCase();
  const ftEl = document.getElementById('dtFeedTitle');
  const fcEl = document.getElementById('dtFeedCount');
  if (ftEl) ftEl.textContent = `${doseNames[dose]} · ${dateStr}`;
  if (fcEl) {
    const total = items.reduce((s,it) => s + (it.subItems?.length > 0 ? it.subItems.length : 1), 0);
    fcEl.textContent = `${total} wpisów`;
  }

  dtRenderFeed(items);
  dtRenderSidebar(items);
  dtShowEmpty();
}

function dtToggleGroup(id) {
  const g = document.getElementById(`dtg-${id}`);
  const h = document.getElementById(`dti-${id}`);
  if (!g) return;
  const open = g.style.display !== 'none';
  g.style.display = open ? 'none' : 'block';
  h?.classList.toggle('selected', !open);
  if (open) {
    document.querySelectorAll('.dt-sub-item.selected').forEach(e => e.classList.remove('selected'));
    dtShowEmpty();
  }
}

function dtPickItem(id) {
  const item = dtItemsMap[id];
  if (!item) return;
  document.querySelectorAll('.dt-item.selected,.dt-sub-item.selected').forEach(e => e.classList.remove('selected'));
  (document.getElementById(`dti-${id}`) || document.getElementById(`dts-${id}`))?.classList.add('selected');
  dtCurrentItemId = id;
  dtShowDetail(item);
}

function dtShowEmpty() {
  const det = document.getElementById('dtDetail');
  if (det) det.innerHTML = `<div class="dt-detail-empty"><div class="dt-detail-empty-icon">→</div><div class="dt-detail-empty-text">Wybierz news aby przeczytać artykuł</div></div>`;
  dtCurrentItemId = null;
}

function dtShowDetail(item) {
  const det = document.getElementById('dtDetail');
  if (!det) return;
  const cat = dtGetCategory(item);
  const time = formatAddedAt(item);
  const readBtn = (item.source_url && item.source_url !== '#')
    ? `<a class="dt-read-btn" href="${item.source_url}" target="_blank" rel="noopener">CZYTAJ →</a>`
    : (item.rssLink ? `<a class="dt-read-btn" href="${item.rssLink}" target="_blank" rel="noopener">CZYTAJ →</a>` : '');
  const allItems = cache[currentDose] || [];
  const related = [];
  for (const it of allItems) {
    if (related.length >= 3) break;
    const cands = it.subItems?.length > 0 ? it.subItems : [it];
    for (const c of cands) {
      if (c.id !== item.id && related.length < 3) related.push(c);
    }
  }
  det.innerHTML = `
    <div class="dt-detail-content">
      <div class="dt-detail-flag">${item.flag||'📰'}</div>
      <div class="dt-detail-badges"><span class="dt-detail-badge">${cat.toUpperCase()}</span></div>
      <div class="dt-detail-headline">${item.text}</div>
      <div class="dt-detail-time">${time||'—'}</div>
      ${item.article
        ? `<div class="dt-detail-body">${item.article}</div>`
        : `<div class="dt-detail-no-article">Brak rozszerzonego artykułu dla tego wpisu.</div>`}
      ${impactHtml(item)}
      <div class="dt-source-row">
        <div>
          <div class="dt-source-label">ŹRÓDŁO</div>
          <div class="dt-source-name">${item.source_name||'—'}</div>
        </div>
        ${readBtn}
      </div>
    </div>
    ${related.length ? `<div class="dt-related">
      <div class="dt-related-title">Inne wpisy</div>
      ${related.map(r=>`<div class="dt-related-item" onclick="dtPickItem('${r.id}')"><span>${r.flag||'📰'}</span><span>${r.text.length>80?r.text.slice(0,80)+'…':r.text}</span></div>`).join('')}
    </div>` : ''}`;
}

// init desktop header
(function() {
  const el = document.getElementById('dtHeaderDate');
  if (el) el.textContent = new Date().toLocaleDateString('pl-PL',{weekday:'short',day:'numeric',month:'short'}).toUpperCase();
  document.querySelectorAll('.dt-tab').forEach(t => t.classList.remove('active'));
  const tab = document.getElementById('dttab-'+currentDose);

  const dtTheme = document.getElementById('dtThemeBtn');
  if (dtTheme) {
    const theme = document.documentElement.getAttribute('data-theme');

  }
})();

// sync desktop theme btn on toggle
const _origToggleTheme = toggleTheme;
toggleTheme = function() {
  _origToggleTheme();
  const dtBtn = document.getElementById('dtThemeBtn');
  if (dtBtn) {
    const theme = document.documentElement.getAttribute('data-theme');
    dtBtn.textContent = theme === 'dark' ? '☀️' : '🌙';
  }
};

  if (document.visibilityState === 'visible') {
    delete cache[currentDose];
    loadDose(currentDose, true);
  }
});

  if (event.persisted) {
    delete cache[currentDose];
    loadDose(currentDose, true);
  }
